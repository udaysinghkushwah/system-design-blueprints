openapi: 3.0.0
info:
  title: Zomato Food Delivery System API
  description: API Contracts for Customer Searches, Order Management, and Delivery Rider Coordinates Ingestion.
  version: 1.0.0
servers:
  - url: https://api.zomato.com/v1
    description: Production API Server
  - url: http://localhost:8080/v1
    description: Local Mock Server
paths:
  /search:
    get:
      summary: Search nearby restaurants
      description: Returns a list of restaurants matching search filters and location query within H3 grids.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: A list of restaurants
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restaurant'
  /orders:
    post:
      summary: Place a new order
      description: Initiates the checkout transaction and updates the status to CREATED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Order successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
  /orders/{orderId}:
    get:
      summary: Track an order
      description: Retrieves status and estimated delivery time for a specific order.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order tracking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderTracking'
  /riders/location:
    post:
      summary: Ingest rider GPS coordinates
      description: Endpoint for delivery riders to stream live locations every 4 seconds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiderLocationUpdate'
      responses:
        '200':
          description: Coordinate ingested successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK

components:
  schemas:
    Restaurant:
      type: object
      properties:
        restaurant_id:
          type: string
          format: uuid
        name:
          type: string
        rating:
          type: number
          format: float
        distance_meters:
          type: integer
        h3_index:
          type: string
        avg_preparation_time_mins:
          type: integer
        promotions:
          type: array
          items:
            type: string
    OrderRequest:
      type: object
      required:
        - user_id
        - restaurant_id
        - items
        - delivery_address_coords
        - payment_method
        - total_amount
      properties:
        user_id:
          type: string
          format: uuid
        restaurant_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            properties:
              item_id:
                type: string
              quantity:
                type: integer
              customizations:
                type: array
                items:
                  type: string
        delivery_address_coords:
          type: object
          properties:
            lat:
              type: number
            lon:
              type: number
        payment_method:
          type: string
        total_amount:
          type: number
    OrderResponse:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        order_status:
          type: string
        estimated_delivery_time:
          type: string
          format: date-time
    OrderTracking:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        order_status:
          type: string
        rider_assigned:
          type: boolean
        rider_id:
          type: string
          format: uuid
        estimated_delivery_time:
          type: string
          format: date-time
    RiderLocationUpdate:
      type: object
      required:
        - rider_id
        - latitude
        - longitude
        - bearing
        - timestamp
      properties:
        rider_id:
          type: string
          format: uuid
        latitude:
          type: number
        longitude:
          type: number
        bearing:
          type: number
        timestamp:
          type: integer
